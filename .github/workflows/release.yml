name: release

# Tag-triggered (`v*`) OR manually dispatchable with an existing tag.
# Restructured 2026-05-21 so artifacts appear on the GitHub Release
# as each build finishes, instead of all-or-nothing at the end:
#
#   1. `init-release` creates the (empty) release once. Idempotent —
#      a re-run on an existing release leaves it alone.
#   2. Three parallel matrix jobs build artifacts and each call
#      `gh release upload --clobber` on completion. As soon as a job
#      finishes its asset shows up in the release.
#   3. `finalize-release` (if: always()) recomputes SHA256SUMS from
#      whatever assets actually landed and uploads it.
#
# The `macos-13` (x86_64-apple-darwin) runner has been intermittently
# unavailable; that one job is `continue-on-error: true` with a
# timeout so it can't block the release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist).'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # NOT -Dwarnings — see ci.yml feature-matrix comment.

jobs:
  init-release:
    name: Create GitHub Release (idempotent)
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
      - id: resolve
        name: Resolve tag name
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"
      - name: Extract changelog section
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          VER="${TAG#v}"
          awk -v ver="$VER" '
            $0 ~ "^## \\[" ver "\\]" { p=1; print; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release ${TAG}. See CHANGELOG.md for details." > release_notes.md
          fi
          cat release_notes.md
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving as-is."
          else
            gh release create "$TAG" --title "$TAG" --notes-file release_notes.md
          fi

  build-docx-cli:
    name: crisp-docx (${{ matrix.target }})
    needs: init-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: ${{ matrix.optional }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, ext: '',     archive: tar.gz, optional: false }
          - { os: macos-latest,   target: aarch64-apple-darwin,     ext: '',     archive: tar.gz, optional: false }
          # macOS x86_64 runners are scarce; let the release ship without it.
          - { os: macos-13,       target: x86_64-apple-darwin,      ext: '',     archive: tar.gz, optional: true  }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   ext: '.exe', archive: zip,    optional: false }
    steps:
      - uses: actions/checkout@v5
        with:
          path: crisp-docx
      # Sibling-repo checkouts: needed for workspace path-dep metadata.
      # `-p crisp-docx-cli` doesn't actually link CrispEmbed/CrispASR.
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispEmbed
          path: CrispEmbed
          submodules: false
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispASR
          path: CrispASR
          submodules: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: cargo build --release -p crisp-docx-cli
        working-directory: crisp-docx
        run: cargo build --release --target ${{ matrix.target }} -p crisp-docx-cli
      - name: Stage + archive
        shell: bash
        working-directory: crisp-docx
        run: |
          STEM="crisp-docx-${{ needs.init-release.outputs.tag }}-${{ matrix.target }}"
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/crisp-docx${{ matrix.ext }}" staging/
          cp README.md LICENSE staging/
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd staging && 7z a "../${STEM}.zip" .)
          else
            tar -czf "${STEM}.tar.gz" -C staging .
          fi
          ls -la "${STEM}".*
      - name: Upload to GitHub Release
        shell: bash
        working-directory: crisp-docx
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.init-release.outputs.tag }}
        run: |
          # Glob may match a tar.gz or zip depending on matrix.archive;
          # either way exactly one file matches per job.
          for f in crisp-docx-*."${{ matrix.archive }}"; do
            gh release upload "$TAG" "$f" --clobber
          done

  build-translate-full:
    name: crisp-translate --features full (${{ matrix.target }})
    needs: init-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    continue-on-error: ${{ matrix.optional }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, optional: false }
          - { os: macos-latest,  target: aarch64-apple-darwin,    optional: false }
    steps:
      - uses: actions/checkout@v5
        with:
          path: crisp-docx
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispEmbed
          path: CrispEmbed
          submodules: recursive
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispASR
          path: CrispASR
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: cargo build --release --features full
        working-directory: crisp-docx
        run: cargo build --release --target ${{ matrix.target }} -p crisp-translate-cli --features full
      - name: Stage + archive
        shell: bash
        working-directory: crisp-docx
        run: |
          STEM="crisp-translate-full-${{ needs.init-release.outputs.tag }}-${{ matrix.target }}"
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/crisp-translate" staging/
          cp README.md LICENSE staging/
          tar -czf "${STEM}.tar.gz" -C staging .
          ls -la "${STEM}".*
      - name: Upload to GitHub Release
        shell: bash
        working-directory: crisp-docx
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.init-release.outputs.tag }}
        run: gh release upload "$TAG" crisp-translate-full-*.tar.gz --clobber

  build-wheels:
    name: wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: init-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v5
        with:
          path: crisp-docx
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispEmbed
          path: CrispEmbed
          submodules: false
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispASR
          path: CrispASR
          submodules: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        working-directory: crisp-docx/crates/crisp-docx-py
        run: maturin build --release --out dist
      - name: Upload to GitHub Release
        shell: bash
        working-directory: crisp-docx/crates/crisp-docx-py
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.init-release.outputs.tag }}
        run: |
          for w in dist/*.whl; do
            gh release upload "$TAG" "$w" --clobber
          done

  finalize-release:
    name: Refresh SHA256SUMS
    needs: [init-release, build-docx-cli, build-translate-full, build-wheels]
    if: always() && needs.init-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets + sha256sum
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.init-release.outputs.tag }}
        run: |
          mkdir assets && cd assets
          # Download every asset currently on the release. The old
          # sha256sums.txt (if any) is included; we exclude it from
          # the input list and overwrite at the end via --clobber.
          gh release download "$TAG" --dir .
          ls -la
          find . -maxdepth 1 -type f ! -name 'sha256sums.txt' -print0 \
            | xargs -0 sha256sum > sha256sums.txt
          cat sha256sums.txt
          gh release upload "$TAG" sha256sums.txt --clobber
