name: ci

# crisp-docx workspace members `crisp-docx-align`, `crisp-docx-llm`,
# and `crisp-translate-cli` carry path deps on:
#
#   crisp-docx-align     → ../../CrispEmbed/crispembed   (optional + dev-deps)
#   crisp-docx-llm       → ../../../CrispASR/crispasr     (optional, behind `nmt`)
#   crisp-translate-cli  → both of the above              (optional, behind `align`)
#
# Cargo metadata resolves manifests even when the optional features
# are OFF, so CI must have both sibling repos present or every cargo
# command fails before it starts.
#
# What actually compiles: only crisp-docx-* crates. CrispEmbed's and
# CrispASR's C++ (ggml) runtimes are NOT built unless a `--features
# crispembed`, `--features align`, or `--features nmt` is passed,
# which we don't do in any of the default jobs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: crisp-docx
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispEmbed
          path: CrispEmbed
          submodules: false
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispASR
          path: CrispASR
          submodules: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - working-directory: crisp-docx
        run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: crisp-docx
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispEmbed
          path: CrispEmbed
          submodules: false
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispASR
          path: CrispASR
          submodules: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: clippy core + cli (no align feature — CrispEmbed C++ runtime not compiled)
        working-directory: crisp-docx
        run: cargo clippy --workspace --exclude crisp-docx-py --all-targets -- -D warnings
      - name: clippy py bindings
        working-directory: crisp-docx
        env:
          PYO3_PYTHON: ${{ env.pythonLocation }}/bin/python
        run: cargo clippy -p crisp-docx-py -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          path: crisp-docx
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispEmbed
          path: CrispEmbed
          submodules: false
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispASR
          path: CrispASR
          submodules: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust core + CLI tests
        working-directory: crisp-docx
        run: cargo test --workspace --exclude crisp-docx-py

  # Verifies every feature combination of `crisp-translate-cli` at least
  # type-checks. The default build is covered by the `test` job above;
  # this job catches regressions in feature gating (a missing `#[cfg]`
  # arm, an unused import that surfaces only with a feature on, etc).
  #
  # We use `cargo check` instead of full builds because we don't need
  # to actually link CrispEmbed / CrispASR's C++ — the type-check
  # passes through their Rust crate-graph and that's the layer where
  # cfg-related breakage lives. On Linux the build script for the
  # `-sys` crates still runs cmake to configure, which is the slow
  # part; this job is therefore on the order of "minutes, not tens"
  # rather than instant.
  feature-matrix:
    runs-on: ubuntu-latest
    needs: [fmt]
    # Unlike the rest of CI, this job actually turns on the C++-backed
    # features, so it needs the ggml submodule under CrispEmbed/CrispASR
    # AND it cannot run under -Dwarnings: those sibling crates are path
    # dependencies (not registry crates), so cargo does not auto-apply
    # --cap-lints=warn to them, and upstream's own #[deprecated] items
    # (e.g. `CrispASR` self-deprecation inside the crispasr lib) turn
    # into hard errors that we have no way to fix from this repo. Lint
    # cleanliness for our code is already enforced by the clippy job.
    env:
      RUSTFLAGS: ""
    strategy:
      fail-fast: false
      matrix:
        features: ["nmt", "align", "full"]
    steps:
      - uses: actions/checkout@v5
        with:
          path: crisp-docx
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispEmbed
          path: CrispEmbed
          submodules: recursive
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispASR
          path: CrispASR
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check -p crisp-translate-cli --features ${{ matrix.features }}
        working-directory: crisp-docx
        run: cargo check -p crisp-translate-cli --features ${{ matrix.features }}

  build-wheel:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
        with:
          path: crisp-docx
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispEmbed
          path: CrispEmbed
          submodules: false
      - uses: actions/checkout@v5
        with:
          repository: CrispStrobe/CrispASR
          path: CrispASR
          submodules: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        working-directory: crisp-docx/crates/crisp-docx-py
        run: maturin build --release --out dist
      - name: Install + smoke test
        working-directory: crisp-docx/crates/crisp-docx-py
        run: |
          pip install --find-links dist crisp_docx
          python -c "import crisp_docx; print(crisp_docx.__version__)"
